name: Build and Deploy AFI Pages

on:
  push:
    branches:
      - main  # Adjust if your default branch is different
    paths:
      - 'afi-build/content/**'  # Triggers on changes to your markdown files
  workflow_dispatch:  # Allows you to manually trigger the workflow from GitHub's UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install jinja2 markdown pyyaml

      - name: Build HTML files
  run: |
    cd afi-build
    python build.py --all

- name: Copy output to root for GitHub Pages
  run: |
    cp -r afi-build/output/* .
    # If you want to keep a clean root, put them in /docs instead:
    # mkdir -p docs && cp -r afi-build/output/* docs/

- name: Commit built files
  run: |
    git config --global user.name 'github-actions[bot]'
    git config --global user.email 'github-actions[bot]@users.noreply.github.com'
    git add index.html issue-*.html   # or if using docs: git add docs/
    git commit -m 'Auto-build HTML from markdown' || exit 0
    git push
